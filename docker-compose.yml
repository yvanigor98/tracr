services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: tracr_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracr}
      POSTGRES_DB: ${POSTGRES_DB:-tracr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tracr_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_celery_worker
    command: uv run celery -A tracr.tasks worker --loglevel=info -Q ingestion,processing
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_celery_beat
    command: uv run celery -A tracr.tasks beat --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped
    deploy:
      replicas: 1

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_flower
    command: uv run celery -A tracr.tasks flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - celery_worker
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
