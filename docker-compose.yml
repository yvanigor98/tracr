services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: tracr_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tracr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracr}
      POSTGRES_DB: ${POSTGRES_DB:-tracr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tracr_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    container_name: tracr_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-tracr-neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-tracr-neo4j}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  nlp_service:
    build:
      context: .
      dockerfile: docker/nlp/Dockerfile
    container_name: tracr_nlp
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "-X", "POST", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      nlp_service:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_celery_worker
    command: uv run celery -A tracr.tasks worker --loglevel=info -Q ingestion,processing
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      nlp_service:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_celery_beat
    command: uv run celery -A tracr.tasks beat --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped
    deploy:
      replicas: 1

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracr_flower
    command: uv run celery -A tracr.tasks flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - celery_worker
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
